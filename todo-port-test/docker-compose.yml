services:
  postgres:
    image: postgres:16
    container_name: todo-port-test-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5434:5432"
    volumes:
      - todo-port-test_postgres_data:/var/lib/postgresql/data

volumes:
  todo-port-test_postgres_data:
